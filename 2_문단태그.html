<!--
    문단태그 <p>
    내용상 끊어서 구분할 수 있는 하나하나의 부분을 의미
    <p> 태그를 이용해서 문단을 표현

    f12 눌러서 영역확인
    파란 영역 -> 자기 영역 노란 영역 -> margine
    블록태그 -> 옆에 아무도 못 온다( 자신이 포함된 줄 전체가 파란 영역 )
    인라인 태그 -> 다음 요소가 옆에 붙는다 ( 자기자신만 파란 영역 )

    <p>태그는 블록태그
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문단태그</title>
</head>
<body>
    <p>내용상 끊어서 구분할 수 있는 하나하나 부분을 의미하고
        &lt;p&gt; 태그를 이용해서 문단을 표현합니다
    </p> &lt;p&gt; 태그 영역 밖입니다
</body>
</html>
