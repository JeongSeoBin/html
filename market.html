<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1 {
            /*div의 전체 테두리와 크기를 지정한다*/
            border: 1px solid rgb(105, 102, 102);
            width: 500px;
            height: 450px;
            /*가운데 정렬한다*/
            margin: 3px auto;
        }
        .div2 {
            /*div의 전체 테두리와 크기를 지정한다*/
            border: 1px solid rgb(105, 102, 102);
            width: 500px;
            /*가운데 정렬한다*/
            margin: 3px auto;    
        }
        img {
            /*이미지가 div영역에 딱 들어가게 맞춘다*/
            width :100%;
            height :100%;
        }
        table {
            /*div에 테이블이 딱 들어가게 한다*/
            width :100%;
            /*전체적인 글자 크기 굵기를 지정한다*/
            font-size: 13px;
            font-weight: 900;
        }
        #confirm {
            font-size: 12px;
            color: white;
            background-color: black;
            padding:7px;
        }
        .title {
            color: red;
            font-size: 12px;
            padding-bottom: 10px;
        }
        .blue {
            color:blue;
            line-height: 26px;
        }
        #consultTime {
            color: rgb(139, 138, 138);
            font-size: 9px;
            padding-bottom: 17px;
        }
        .padding-bottom {
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="div1">
        <img src="./apple.jpg">
    </div>
    <div class="div2">
        <!--전체 테이블의 border를 없애고 중간선은 hr로 대체한다-->
        <table border="0">
            <tr><td id="confirm">확인하세요</td></tr>

            <tr><th class="title" style="padding-top: 7px;">주문 및 배송</th></tr>
            <tr><th><span class="blue" >오후 2시 이전</span> 주문건은 당일 발송드립니다.</th></tr>
            <tr><th class="padding-bottom">2시 이후 주문건은 다음날 발송드립니다.</th></tr>

            <tr><th><hr style="width: 100%;"></th></tr>

            <tr><th class="title">교환 및 환불</th></tr>
            <tr><th>불만족시 <span class="blue">100% 환불</span>해 드립니다.</th></tr>
            <tr><th class="padding-bottom">고객센터로 전화주세요.</th></tr>

            <tr><th><hr style="width: 100%;"></th></tr>

            <tr><th class="title">고객센터</th></tr>
            <tr><th class="padding-bottom">0000-0000</th></tr>
            <tr><th id="consultTime">상담시간 : 오전 9시 ~ 오후 6시(토/일, 공휴일 휴무)</th></tr>
        </table>
    </div>  
</body>
</html>
